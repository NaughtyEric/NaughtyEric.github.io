<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NaughtyEric 个人主页</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #111827 0%, #1f2937 45%, #374151 100%);
        color: #f9fafb;
      }

      .container {
        max-width: 840px;
        margin: 0 auto;
        padding: 3rem 1.25rem;
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .header h1 {
        margin: 0;
        font-size: 2rem;
      }

      .header p {
        margin-top: 0.75rem;
        color: #d1d5db;
      }

      .card-grid {
        display: grid;
        gap: 1rem;
      }

      .card {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        padding: 1.2rem;
        background: rgba(17, 24, 39, 0.55);
        backdrop-filter: blur(6px);
      }

      .card h2 {
        margin: 0 0 0.65rem;
        font-size: 1.2rem;
      }

      .placeholder {
        margin: 0;
        color: #9ca3af;
        border-left: 3px solid #60a5fa;
        padding-left: 0.75rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            name: "NaughtyEric",
            intro: "欢迎来到我的个人界面，这里将持续更新我的成长与成果。",
            sections: [
              { title: "教育经历", placeholder: "（预留空位）请在此补充学校、专业、毕业时间等信息。" },
              { title: "奖项荣誉", placeholder: "（预留空位）请在此补充竞赛、奖学金或荣誉称号等内容。" },
              { title: "实践成果", placeholder: "（预留空位）请在此补充项目、实习、论文或作品成果。" }
            ]
          };
        },
        template: `
          <main class="container">
            <header class="header">
              <h1>你好，我是 {{ name }}</h1>
              <p>{{ intro }}</p>
            </header>

            <section class="card-grid">
              <article class="card" v-for="section in sections" :key="section.title">
                <h2>{{ section.title }}</h2>
                <p class="placeholder">{{ section.placeholder }}</p>
              </article>
            </section>
          </main>
        `
      }).mount("#app");
    </script>
  </body>
</html>
